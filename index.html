<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rack Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        [contenteditable]:focus { outline: 2px solid #3b82f6; background: #1e293b; border-radius: 4px; padding: 2px 4px; }
        #mainApp { display: none; }
        /* Special styles for a clean table export */
        .export-layout { background-color: white !important; color: black !important; padding: 40px !important; width: 1200px !important; }
        .export-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .export-table th, .export-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .export-table th { background-color: #f2f2f2; font-size: 12px; text-transform: uppercase; }
        .export-notes { margin-top: 30px; padding: 20px; border-top: 2px solid #3b82f6; background: #f9fafb; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans p-6 md:p-10">

    <div id="loginScreen" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-[100]">
        <div class="bg-gray-900 p-10 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-md space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-blue-400">Rack<span class="text-white"> Tracker</span></h1>
            </div>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="Username" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <input type="password" id="passIn" placeholder="Password" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl">Login</button>
            </div>
        </div>
    </div>

    <div id="mainApp">
        <nav class="flex justify-between items-center pb-8 border-b border-gray-800 mb-8">
            <h1 class="text-3xl font-extrabold text-blue-400">Rack<span class="text-white"> Tracker</span></h1>
            <button onclick="logout()" class="text-gray-500 hover:text-red-400 text-xs">Logout</button>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-gray-900 p-6 rounded-2xl border border-gray-800 mb-8">
            <input type="date" id="dateFilter" class="bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
            <input type="text" id="searchQuery" placeholder="Search..." class="bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
            <select id="actionMenu" onchange="handleActionMenu(this.value)" class="bg-purple-900/20 border border-purple-500/30 p-3 rounded-lg text-purple-300 font-bold">
                <option value="">-- Select Action --</option>
                <option value="add">Add New Rack</option>
                <option value="export">Export Professional Table</option>
            </select>
        </div>

        <div id="tablesContainer" class="space-y-8">
            <div class="rounded-2xl overflow-hidden border border-emerald-900/30 bg-gray-900">
                <div class="bg-emerald-900/20 px-6 py-4 border-b border-gray-800">
                    <h3 class="text-lg font-bold text-emerald-400">Active Racks</h3>
                </div>
                <table class="w-full text-left whitespace-nowrap" id="activeTable">
                    <thead class="bg-gray-800 text-[11px] text-gray-400 uppercase">
                        <tr><th class="px-6 py-3">Rack ID</th><th class="px-6 py-3">Location</th><th class="px-6 py-3">Issues</th><th class="px-6 py-3">Action</th><th class="px-6 py-3">Tech</th></tr>
                    </thead>
                    <tbody id="activeTableBody" class="divide-y divide-gray-800 text-sm"></tbody>
                </table>
            </div>
        </div>

        <div class="mt-12 bg-gray-900 p-8 rounded-2xl border border-blue-900/30 shadow-xl">
            <div class="flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                <h3 class="text-xl font-bold text-white">Shift Handover Notes</h3>
            </div>
            <textarea id="shiftNotes" placeholder="Enter notes for the next shift here (e.g., Pending tasks, hardware issues to watch)..." 
                class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-gray-300 focus:ring-2 focus:ring-blue-500 h-32"
                oninput="saveNotesLocally()"></textarea>
        </div>
    </div>

    <div id="exportTemplate" class="hidden">
        <div id="exportContent">
            <h1 style="font-size: 24px; color: #1e3a8a; margin-bottom: 10px;">Daily Rack Status Report</h1>
            <p id="exportDateLabel" style="color: #666; margin-bottom: 20px;"></p>
            
            <table class="export-table" id="exportTargetTable">
                <thead>
                    <tr><th>Rack ID</th><th>Location</th><th>Issues Found</th><th>Action Taken</th><th>Tech</th></tr>
                </thead>
                <tbody id="exportTableBody"></tbody>
            </table>

            <div class="export-notes">
                <h3 style="color: #1e3a8a; margin-bottom: 10px; font-size: 18px;">Shift Handover Notes</h3>
                <p id="exportNotesContent" style="white-space: pre-wrap; color: #333; line-height: 1.6;"></p>
            </div>
        </div>
    </div>

    <script>
        let allRacks = JSON.parse(localStorage.getItem('rackTrackerDB')) || {};
        
        // Load notes from storage
        document.getElementById('shiftNotes').value = localStorage.getItem('shiftNotes') || "";

        function saveNotesLocally() {
            localStorage.setItem('shiftNotes', document.getElementById('shiftNotes').value);
        }

        function exportReport() {
            const date = document.getElementById('dateFilter').value;
            const notes = document.getElementById('shiftNotes').value;
            const activeRacks = allRacks[date] || [];

            // Populate the hidden export template
            document.getElementById('exportDateLabel').innerText = `Date: ${date}`;
            document.getElementById('exportNotesContent').innerText = notes || "No specific notes provided for this shift.";
            
            const tbody = document.getElementById('exportTableBody');
            tbody.innerHTML = activeRacks.map(r => `
                <tr>
                    <td style="font-weight: bold;">${r.serial}</td>
                    <td>${r.location || '--'}</td>
                    <td>${r.issuesFound || '--'}</td>
                    <td style="color: #059669;">${r.actionTaken || '--'}</td>
                    <td>${r.checkedBy || '--'}</td>
                </tr>
            `).join('');

            // Render the hidden template to an image
            const container = document.getElementById('exportTemplate');
            const content = document.getElementById('exportContent');
            
            container.classList.remove('hidden');
            content.classList.add('export-layout');

            html2canvas(content, { scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Rack_Report_${date}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                
                content.classList.remove('export-layout');
                container.classList.add('hidden');
            });
        }

        // Logic for login and table display (simplified for this example)
        function handleLogin() { document.getElementById('loginScreen').style.display='none'; document.getElementById('mainApp').style.display='block'; }
        function handleActionMenu(val) { if(val === 'export') exportReport(); }
    </script>
</body>
</html>
