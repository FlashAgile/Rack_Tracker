<div id="rackModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-opacity">
    <div class="bg-gray-900 w-full max-w-md p-8 rounded-2xl border border-blue-900/50 shadow-2xl space-y-6 relative">
        <button onclick="toggleModal('rackModal')" class="absolute top-6 right-6 text-gray-500 hover:text-white">✕</button>
        <h3 class="text-2xl font-bold text-blue-400">Add Rack</h3>
        
        <div class="space-y-4">
            <div class="flex gap-2 p-1 bg-gray-800 rounded-lg">
                <button id="btnNew" onclick="toggleAddMode('new')" class="flex-1 py-2 rounded-md bg-blue-600 text-white text-sm font-bold">New Entry</button>
                <button id="btnFromYesterday" onclick="toggleAddMode('yesterday')" class="flex-1 py-2 rounded-md text-gray-400 text-sm font-bold">From Yesterday</button>
            </div>

            <div id="yesterdaySelectGroup" class="hidden space-y-2">
                <label class="text-xs text-gray-500 uppercase">Select Rack from Yesterday</label>
                <select id="yesterdayRackSelector" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white"></select>
            </div>

            <div id="newEntryFields" class="space-y-4">
                <input type="text" id="newRackSerial" placeholder="Rack Serial/ID" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <input type="text" id="newRackLocation" placeholder="Location" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
            </div>

            <input type="text" id="newRackCheckedBy" placeholder="Checked By" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
            
            <button onclick="confirmAddRack()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-white shadow-lg shadow-blue-900/20">Confirm Add</button>
        </div>
    </div>
</div>
