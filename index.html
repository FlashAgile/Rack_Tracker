<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Rack Tracker PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        [contenteditable]:focus { outline: 2px solid #3b82f6; background: #1e293b; border-radius: 4px; padding: 2px 4px; }
        #mainApp { display: none; }
        .export-theme { background-color: #030712 !important; padding: 40px !important; width: 1000px !important; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans p-6 md:p-10">

    <div id="loginScreen" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-[100]">
        <div class="bg-gray-900 p-10 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-md space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-blue-400">Rack<span class="text-white">Tracker</span></h1>
                <p class="text-gray-500 text-sm mt-2">Authorized Access Only</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="Username" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white focus:ring-2 focus:ring-blue-500">
                <input type="password" id="passIn" placeholder="Password" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Login</button>
            </div>
        </div>
    </div>

    <div id="mainApp">
        <nav class="flex items-center justify-between pb-8 border-b border-gray-800 mb-8">
            <h1 class="text-3xl font-extrabold text-blue-400 tracking-tight">Rack<span class="text-white">Tracker</span> PRO</h1>
            <div class="flex gap-3">
                <button onclick="logout()" class="text-gray-500 hover:text-red-400 text-sm mr-4 font-medium">Logout</button>
                <button onclick="openDeleteModal()" class="flex items-center gap-2 bg-red-900/20 hover:bg-red-900/40 text-red-400 border border-red-900/50 font-semibold py-2 px-5 rounded-full shadow-md transition-all text-sm">Delete Rack</button>
                <button onclick="openPassModal()" class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition-all text-sm">Pass Rack</button>
                <button onclick="openAddModal()" class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-5 rounded-full shadow-md transition-all text-sm">Add New Rack</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Research Date</label>
                    <input type="date" id="dateFilter" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Search Records (Universal)</label>
                    <div class="flex gap-2">
                        <input type="text" id="searchQuery" placeholder="SN, Location, or History..." class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white focus:ring-2 focus:ring-blue-500">
                        <button onclick="performGlobalSearch()" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-lg text-white transition">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="flex items-end gap-3">
                    <button onclick="exportActiveTableOnly()" class="w-full h-12 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-lg shadow-md transition-all">Export Report</button>
                    <button onclick="clearDayData()" class="px-4 h-12 bg-gray-800 hover:bg-red-950 text-gray-400 rounded-lg transition text-xs">Clear Day</button>
                </div>
            </div>

            <div id="searchResultsSection" class="hidden space-y-4">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-bold text-blue-400">Search Results & Archive History</h3>
                    <button onclick="closeSearch()" class="text-gray-500 hover:text-white text-sm">Close Results</button>
                </div>
                <div class="bg-gray-900 border border-blue-900/30 rounded-2xl overflow-hidden shadow-2xl">
                    <table class="w-full text-left">
                        <thead class="bg-blue-900/20 text-xs text-blue-300 uppercase tracking-wider">
                            <tr>
                                <th class="px-6 py-4">Logged Date</th>
                                <th class="px-6 py-4">Serial / Location</th>
                                <th class="px-6 py-4">Archived History / Notes</th>
                                <th class="px-6 py-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="searchResultsBody" class="divide-y divide-gray-800"></tbody>
                    </table>
                </div>
            </div>

            <div id="activeExportContainer" class="rounded-2xl overflow-hidden">
                <div class="bg-gray-900 border border-emerald-900/30 shadow-xl">
                    <div class="bg-emerald-900/20 px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                        <div>
                            <h3 class="text-lg font-bold text-emerald-400">Active Racks</h3>
                            <p class="text-xs text-gray-500 font-mono uppercase" id="exportDateLabel"></p>
                        </div>
                        <span id="activeCount" class="text-xs font-mono bg-emerald-900/50 px-2 py-1 rounded border border-emerald-700 text-emerald-300">0 Units</span>
                    </div>
                    <table class="w-full text-left">
                        <tbody id="activeTableBody" class="divide-y divide-gray-800"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-gray-900 rounded-2xl border border-gray-800 shadow-xl overflow-hidden">
                <div class="bg-gray-800/50 px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-gray-400">Inactive History</h3>
                    <span id="inactiveCount" class="text-xs font-mono text-gray-500">0 Units</span>
                </div>
                <table class="w-full text-left">
                    <tbody id="inactiveTableBody" class="divide-y divide-gray-800 opacity-60"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="rackModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 transition-all duration-300 opacity-0 pointer-events-none">
        <div class="bg-gray-900 w-full max-w-xl p-8 rounded-2xl border border-gray-700 shadow-2xl space-y-6">
            <h3 class="text-2xl font-bold text-blue-400">Log New Server Rack</h3>
            <div class="bg-blue-900/10 border border-blue-900/30 p-4 rounded-xl space-y-2">
                <label class="text-xs font-bold text-blue-400 uppercase">Pull from Previous Day Active List</label>
                <select id="prevDaySelector" onchange="autoFillFromPrev()" class="w-full bg-gray-800 p-2 rounded border border-gray-700 text-sm text-white">
                    <option value="">-- Select an active rack from yesterday --</option>
                </select>
            </div>
            <div class="space-y-4">
                <input type="text" id="serial" placeholder="Serial Number" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <input type="text" id="location" placeholder="Location" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <textarea id="notes" placeholder="Initial Rack History..." rows="3" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white"></textarea>
            </div>
            <div class="flex items-center justify-between bg-gray-800 p-4 rounded-lg border border-gray-700">
                <span class="font-medium text-gray-300">Active Status</span>
                <input type="checkbox" id="active" class="w-6 h-6 rounded bg-gray-700 border-gray-600 text-blue-600" checked>
            </div>
            <div class="flex gap-3">
                <button onclick="saveRackEntry()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">Save Entry</button>
                <button onclick="toggleModal('rackModal')" class="px-6 bg-gray-800 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 transition-all duration-300 opacity-0 pointer-events-none">
        <div class="bg-gray-900 w-full max-w-md p-8 rounded-2xl border border-red-900/50 shadow-2xl space-y-6">
            <h3 class="text-2xl font-bold text-red-400">Archive Rack</h3>
            <select id="deleteRackSelector" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white"></select>
            <div class="flex gap-3">
                <button onclick="confirmDeleteRack()" class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-xl font-bold">Confirm Archive</button>
                <button onclick="toggleModal('deleteModal')" class="px-6 bg-gray-800 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="editNotesModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[60] transition-all duration-300 opacity-0 pointer-events-none">
        <div class="bg-gray-900 w-full max-w-2xl p-8 rounded-2xl border border-blue-900/50 shadow-2xl space-y-6">
            <h3 class="text-2xl font-bold text-blue-400">Rack History Log</h3>
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 flex justify-between items-center">
                <p id="editModalSerial" class="text-lg font-bold text-white font-mono"></p>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-medium text-gray-300">Active Status</span>
                    <input type="checkbox" id="editModalStatus" class="w-6 h-6 rounded bg-gray-700 border-gray-600 text-emerald-500">
                </div>
            </div>
            <textarea id="editNotesArea" rows="10" class="w-full bg-gray-950 p-4 rounded-lg border border-gray-800 text-white text-sm"></textarea>
            <button id="saveNotesBtn" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Update Rack</button>
        </div>
    </div>

    <div id="passModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 transition-all duration-300 opacity-0 pointer-events-none">
        <div class="bg-gray-900 w-full max-w-md p-8 rounded-2xl border border-emerald-900/50 shadow-2xl space-y-6">
            <h3 class="text-2xl font-bold text-emerald-400">Pass Rack</h3>
            <select id="activeRackSelector" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white"></select>
            <button onclick="confirmPassRack()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold">Confirm Pass</button>
        </div>
    </div>

    <script>
        // Updated credentials
        const auth = { user: 'Admin', pass: '0122' };

        function handleLogin() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            if(u === auth.user && p === auth.pass) { 
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                loadAndDisplayReport();
            } else alert("Invalid Credentials.");
        }
        function logout() { location.reload(); }

        let allRacks = JSON.parse(localStorage.getItem('rackTrackerDB')) || {};
        let rackArchive = JSON.parse(localStorage.getItem('rackTrackerArchive')) || [];

        const dInput = document.getElementById('dateFilter');
        const sInput = document.getElementById('searchQuery');
        dInput.value = new Date().toISOString().split('T')[0];

        dInput.addEventListener('change', loadAndDisplayReport);
        sInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') performGlobalSearch(); });

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('opacity-0');
            m.classList.toggle('pointer-events-none');
        }

        function openAddModal() {
            const selector = document.getElementById('prevDaySelector');
            selector.innerHTML = '<option value="">-- Select an active rack from yesterday --</option>';
            const currentDate = new Date(dInput.value);
            currentDate.setDate(currentDate.getDate() - 1);
            const prevDateStr = currentDate.toISOString().split('T')[0];
            const prevRacks = allRacks[prevDateStr] || [];
            const activePrev = prevRacks.filter(r => r.active);

            if(activePrev.length > 0) {
                activePrev.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = JSON.stringify({s: r.serial, l: r.location, n: r.notes});
                    opt.innerText = `${r.serial} (${r.location || 'No Loc'})`;
                    selector.appendChild(opt);
                });
            } else {
                const opt = document.createElement('option');
                opt.disabled = true;
                opt.innerText = "No active racks found for " + prevDateStr;
                selector.appendChild(opt);
            }
            toggleModal('rackModal');
        }

        function autoFillFromPrev() {
            const val = document.getElementById('prevDaySelector').value;
            if(!val) return;
            const data = JSON.parse(val);
            document.getElementById('serial').value = data.s;
            document.getElementById('location').value = data.l;
            document.getElementById('notes').value = data.n;
        }

        function performGlobalSearch() {
            const q = sInput.value.toLowerCase().trim();
            if(!q) return closeSearch();
            const resultsSection = document.getElementById('searchResultsSection');
            const resultsBody = document.getElementById('searchResultsBody');
            resultsBody.innerHTML = '';
            resultsSection.classList.remove('hidden');
            let foundAny = false;

            Object.keys(allRacks).forEach(date => {
                allRacks[date].forEach(r => {
                    if(r.serial.toLowerCase().includes(q) || (r.location && r.location.toLowerCase().includes(q))) {
                        appendSearchResult(resultsBody, r, date, "Live Log");
                        foundAny = true;
                    }
                });
            });
            rackArchive.forEach(r => {
                if(r.serial.toLowerCase().includes(q) || (r.location && r.location.toLowerCase().includes(q))) {
                    appendSearchResult(resultsBody, r, r.originalLogDate || "Archive", "Archived");
                    foundAny = true;
                }
            });
            if(!foundAny) resultsBody.innerHTML = '<tr><td colspan="4" class="p-6 text-center text-gray-500">No matches found.</td></tr>';
        }

        function appendSearchResult(container, rack, date, status) {
            container.innerHTML += `
                <tr class="hover:bg-blue-900/10 border-l-4 ${status === 'Archived' ? 'border-red-900' : 'border-emerald-900'}">
                    <td class="px-6 py-4 text-xs font-mono text-gray-400">${date}<br><span class="opacity-50 text-[10px] uppercase">${status}</span></td>
                    <td class="px-6 py-4"><div class="font-bold text-blue-300 font-mono">${rack.serial}</div><div class="text-xs text-gray-500">${rack.location || '--'}</div></td>
                    <td class="px-6 py-4 text-xs text-gray-300 max-w-md truncate">${rack.notes || ''}</td>
                    <td class="px-6 py-4"><button onclick="openEditNotes('${date}', ${rack.id})" class="text-xs bg-gray-800 px-3 py-1 rounded">View</button></td>
                </tr>`;
        }

        function closeSearch() { document.getElementById('searchResultsSection').classList.add('hidden'); sInput.value = ''; loadAndDisplayReport(); }

        function loadAndDisplayReport() {
            const date = dInput.value;
            document.getElementById('exportDateLabel').innerText = date;
            const aTbody = document.getElementById('activeTableBody');
            const iTbody = document.getElementById('inactiveTableBody');
            aTbody.innerHTML = ''; iTbody.innerHTML = '';
            const current = allRacks[date] || [];
            let aCount = 0, iCount = 0;
            current.forEach(r => {
                const row = `<tr>
                    <td class="px-6 py-4"><button onclick="openEditNotes('${date}', ${r.id})" class="text-blue-400 font-mono font-bold underline decoration-dotted">${r.serial}</button></td>
                    <td class="px-6 py-4 text-gray-300 text-sm">${r.location || '--'}</td>
                    <td class="px-6 py-4"><div contenteditable="true" class="bg-gray-950/50 p-2 border border-gray-800 rounded text-sm text-white" onblur="updateAction('${date}', ${r.id}, this.innerText)">${r.actions}</div></td>
                </tr>`;
                if(r.active) { aTbody.innerHTML += row; aCount++; } else { iTbody.innerHTML += row; iCount++; }
            });
            document.getElementById('activeCount').innerText = `${aCount} Units`;
            document.getElementById('inactiveCount').innerText = `${iCount} Units`;
        }

        function saveRackEntry() {
            const serial = document.getElementById('serial').value.trim();
            if(!serial) return;
            const entry = { id: Date.now(), serial, location: document.getElementById('location').value, notes: document.getElementById('notes').value, actions: "", active: document.getElementById('active').checked };
            if (!allRacks[dInput.value]) allRacks[dInput.value] = [];
            allRacks[dInput.value].push(entry);
            syncAndRefresh();
            ['serial', 'location', 'notes'].forEach(id => document.getElementById(id).value = '');
            toggleModal('rackModal');
        }

        function confirmDeleteRack() {
            const id = parseInt(document.getElementById('deleteRackSelector').value);
            const idx = allRacks[dInput.value].findIndex(r => r.id === id);
            if (idx !== -1) {
                rackArchive.push({...allRacks[dInput.value][idx], archivedDate: new Date().toISOString(), originalLogDate: dInput.value});
                localStorage.setItem('rackTrackerArchive', JSON.stringify(rackArchive));
                allRacks[dInput.value].splice(idx, 1);
                syncAndRefresh();
                toggleModal('deleteModal');
            }
        }

        function openEditNotes(date, id) {
            let rack = (allRacks[date] || []).find(r => r.id === id) || rackArchive.find(r => r.id === id);
            if(!rack) return alert("Not found.");
            document.getElementById('editModalSerial').innerText = rack.serial;
            document.getElementById('editModalStatus').checked = rack.active;
            document.getElementById('editNotesArea').value = rack.notes || "";
            document.getElementById('saveNotesBtn').onclick = function() {
                const idx = (allRacks[date] || []).findIndex(r => r.id === id);
                if(idx !== -1) {
                    allRacks[date][idx].notes = document.getElementById('editNotesArea').value;
                    allRacks[date][idx].active = document.getElementById('editModalStatus').checked;
                } else {
                    const archIdx = rackArchive.findIndex(r => r.id === id);
                    rackArchive[archIdx].notes = document.getElementById('editNotesArea').value;
                    rackArchive[archIdx].active = document.getElementById('editModalStatus').checked;
                    localStorage.setItem('rackTrackerArchive', JSON.stringify(rackArchive));
                }
                syncAndRefresh();
                toggleModal('editNotesModal');
            };
            toggleModal('editNotesModal');
        }

        function updateAction(date, id, text) {
            const idx = (allRacks[date] || []).findIndex(r => r.id === id);
            if (idx !== -1) { allRacks[date][idx].actions = text; syncAndRefresh(); }
        }

        function syncAndRefresh() {
            localStorage.setItem('rackTrackerDB', JSON.stringify(allRacks));
            loadAndDisplayReport();
        }

        function openDeleteModal() {
            const current = allRacks[dInput.value] || [];
            if (current.length === 0) return alert("No records.");
            document.getElementById('deleteRackSelector').innerHTML = current.map(r => `<option value="${r.id}">${r.serial}</option>`).join('');
            toggleModal('deleteModal');
        }

        function openPassModal() {
            const active = (allRacks[dInput.value] || []).filter(r => r.active);
            if (active.length === 0) return alert("No active racks.");
            document.getElementById('activeRackSelector').innerHTML = active.map(r => `<option value="${r.id}">${r.serial}</option>`).join('');
            toggleModal('passModal');
        }

        function confirmPassRack() {
            const id = parseInt(document.getElementById('activeRackSelector').value);
            const idx = allRacks[dInput.value].findIndex(r => r.id === id);
            if (idx !== -1) { allRacks[dInput.value][idx].active = false; syncAndRefresh(); toggleModal('passModal'); }
        }

        function clearDayData() { if(confirm("Wipe day?")) { delete allRacks[dInput.value]; syncAndRefresh(); } }

        function exportActiveTableOnly() {
            const element = document.getElementById('activeExportContainer');
            element.classList.add('export-theme');
            html2canvas(element, { backgroundColor: "#030712", scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Active_Racks_${dInput.value}.png`;
                link.href = canvas.toDataURL("image/png");
                link.click();
                element.classList.remove('export-theme');
            });
        }
    </script>
</body>
</html>
