<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rack Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        [contenteditable]:focus { outline: 2px solid #3b82f6; background: #1e293b; border-radius: 4px; padding: 2px 4px; }
        #mainApp, #resetScreen { display: none; }
        /* Modals are hidden by default and only shown via JS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .wrap-col { width: 250px; max-width: 250px; white-space: normal; word-break: break-word; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans p-6 md:p-10">

    <div id="loginScreen" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-[100]">
        <div class="bg-gray-900 p-10 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-md space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-blue-400">Rack<span class="text-white"> Tracker</span></h1>
                <p class="text-gray-500 text-sm mt-2">Authorized Access Only</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="Username" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <input type="password" id="passIn" placeholder="Password" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition">Login</button>
            </div>
        </div>
    </div>

    <div id="resetScreen" class="fixed inset-0 bg-gray-950 items-center justify-center z-[110]">
        <div class="bg-gray-900 p-10 rounded-2xl border border-emerald-500 shadow-2xl w-full max-w-md space-y-6">
            <h2 class="text-2xl font-bold text-white">Setup Your Account</h2>
            <p class="text-gray-400 text-sm">Update your temporary credentials to continue.</p>
            <div class="space-y-4">
                <input type="text" id="newUserInfo" placeholder="New Username" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <input type="password" id="newPassInfo" placeholder="New Password" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <button onclick="saveNewCredentials()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl transition">Save & Continue</button>
            </div>
        </div>
    </div>

    <div id="mainApp">
        <nav class="flex flex-col pb-8 border-b border-gray-800 mb-8">
            <h1 class="text-3xl font-extrabold text-blue-400 tracking-tight leading-none">Rack<span class="text-white"> Tracker</span></h1>
            <button onclick="logout()" class="text-gray-500 hover:text-red-400 text-xs font-medium w-fit mt-1">Logout Account</button>
        </nav>

        <div class="max-w-[1600px] mx-auto space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Select Date</label>
                    <input type="date" id="dateFilter" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-400">Action Menu</label>
                    <select id="actionMenu" onchange="handleActionMenu(this.value)" class="w-full bg-purple-900/20 border border-purple-500/30 p-3 rounded-lg text-purple-300 font-bold">
                        <option value="">-- Select Action --</option>
                        <option value="add">Add Rack</option>
                        <option value="pass">Pass Rack</option>
                        <option value="checkout">Check Out for Repair</option>
                        <option value="export">Export Teams Report</option>
                        <option value="delete">Delete Rack</option>
                    </select>
                </div>
            </div>

            <div class="rounded-2xl overflow-hidden border border-emerald-900/30">
                <div class="bg-emerald-900/20 px-6 py-4 border-b border-gray-800 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-emerald-400">Active Racks</h3>
                    <span id="activeCount" class="text-xs font-mono text-emerald-300">0 Units</span>
                </div>
                <div class="bg-gray-900 overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-800 text-[11px] text-gray-400 uppercase tracking-widest">
                            <tr>
                                <th class="px-6 py-3">Rack ID</th>
                                <th class="px-6 py-3">Test</th>
                                <th class="px-6 py-3">Location</th>
                                <th class="px-6 py-3">Issues Found</th>
                                <th class="px-6 py-3">Action Taken</th>
                                <th class="px-6 py-3">Checked By</th>
                            </tr>
                        </thead>
                        <tbody id="activeTableBody" class="divide-y divide-gray-800"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl space-y-4">
                <h3 class="text-lg font-bold text-blue-400 uppercase tracking-wider text-sm">Shift Notes (Auto-Generated)</h3>
                <textarea id="shiftNotes" rows="8" class="w-full bg-gray-950 p-4 rounded-lg border border-gray-800 text-white text-sm font-mono"></textarea>
            </div>
        </div>
    </div>

    <div id="rackModal" class="modal-overlay">
        <div class="bg-gray-900 w-full max-w-md p-8 rounded-2xl border border-blue-900/50 shadow-2xl space-y-6 relative">
            <button onclick="toggleModal('rackModal')" class="absolute top-6 right-6 text-gray-500 hover:text-white">✕</button>
            <h3 class="text-2xl font-bold text-blue-400">Add Rack</h3>
            <div class="space-y-4">
                <div class="flex gap-2 p-1 bg-gray-800 rounded-lg">
                    <button onclick="toggleAddMode('new')" class="flex-1 py-2 rounded-md bg-blue-600 text-white text-sm font-bold">New</button>
                    <button onclick="toggleAddMode('yesterday')" class="flex-1 py-2 rounded-md text-gray-400 text-sm font-bold">From Yesterday</button>
                </div>
                <div id="yesterdaySelectGroup" class="hidden">
                    <select id="yesterdayRackSelector" class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700"></select>
                </div>
                <div id="newEntryFields" class="space-y-4">
                    <input type="text" id="newRackSerial" placeholder="Rack Serial" class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700">
                    <input type="text" id="newRackLocation" placeholder="Location" class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700">
                </div>
                <select id="newRackTest" class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700">
                    <option value="FRU">FRU</option><option value="IPU">IPU</option><option value="PR">PR</option>
                    <option value="RUNIN">RUNIN</option><option value="RL12">RL12</option><option value="RML">RML</option><option value="RLT">RLT</option>
                </select>
                <input type="text" id="newRackCheckedBy" placeholder="Checked By" class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700">
                <button onclick="confirmAddRack()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-white">Confirm Add</button>
            </div>
        </div>
    </div>

    <div id="checkoutModal" class="modal-overlay">
        <div class="bg-gray-900 w-full max-w-md p-8 rounded-2xl border border-orange-900/50 space-y-6 relative">
            <button onclick="toggleModal('checkoutModal')" class="absolute top-6 right-6 text-gray-500">✕</button>
            <h3 class="text-2xl font-bold text-orange-400">Check Out for Repair</h3>
            <select id="checkoutRackSelector" class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700"></select>
            <textarea id="checkoutReason" placeholder="Reason..." class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700"></textarea>
            <button onclick="confirmCheckout()" class="w-full bg-orange-600 py-3 rounded-xl font-bold text-white">Confirm Checkout</button>
        </div>
    </div>

    <div id="passModal" class="modal-overlay">
        <div class="bg-gray-900 w-full max-w-md p-8 rounded-2xl border border-blue-900/50 space-y-6 relative">
            <button onclick="toggleModal('passModal')" class="absolute top-6 right-6 text-gray-500">✕</button>
            <h3 class="text-2xl font-bold text-blue-400">Pass Rack</h3>
            <select id="passRackSelector" class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700"></select>
            <textarea id="passNotes" placeholder="Action Taken..." class="w-full bg-gray-800 p-3 rounded-lg text-white border border-gray-700"></textarea>
            <button onclick="confirmPassRack()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-white">Confirm Pass</button>
        </div>
    </div>

    <script>
        const savedAuth = JSON.parse(localStorage.getItem('customAuth'));
        const auth = savedAuth || { user: 'TempUser', pass: 'Reset123', isTemp: true };
        const adminAuth = { user: 'Admin', pass: '0122' };
        let allRacks = JSON.parse(localStorage.getItem('rackTrackerDB')) || {};
        let addMode = 'new';

        window.onload = () => { if(localStorage.getItem('rememberMe') === 'true') enterApp(); };

        function handleLogin() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            if (u === adminAuth.user && p === adminAuth.pass) { localStorage.setItem('rememberMe', 'true'); enterApp(); }
            else if (u === auth.user && p === auth.pass) {
                if (auth.isTemp) { 
                    document.getElementById('loginScreen').style.display = 'none'; 
                    document.getElementById('resetScreen').style.display = 'flex'; 
                } else { 
                    localStorage.setItem('rememberMe', 'true'); 
                    enterApp(); 
                }
            } else alert("Invalid Credentials.");
        }

        function saveNewCredentials() {
            const newUser = document.getElementById('newUserInfo').value.trim();
            const newPass = document.getElementById('newPassInfo').value.trim();
            if (!newUser || !newPass) return alert("Fill fields.");
            localStorage.setItem('customAuth', JSON.stringify({ user: newUser, pass: newPass, isTemp: false }));
            alert("Account updated!"); location.reload();
        }

        function enterApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('resetScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            loadAndDisplayReport();
        }

        function logout() { localStorage.removeItem('rememberMe'); location.reload(); }

        const dInput = document.getElementById('dateFilter');
        dInput.value = new Date().toISOString().split('T')[0];
        dInput.addEventListener('change', loadAndDisplayReport);

        // --- THE ACTION MENU BRAIN ---
        function handleActionMenu(v) {
            if(!v) return;
            if(v === 'add') toggleModal('rackModal');
            if(v === 'pass') openPassModal();
            if(v === 'checkout') openCheckoutModal();
            if(v === 'export') exportForTeams();
            if(v === 'delete') alert("Delete function not configured in this view.");
            document.getElementById('actionMenu').value = "";
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function openPassModal() {
            const act = (allRacks[dInput.value] || []).filter(r => r.active);
            if(act.length === 0) return alert("No active racks to pass.");
            document.getElementById('passRackSelector').innerHTML = act.map(r => `<option value="${r.id}">${r.serial}</option>`).join('');
            toggleModal('passModal');
        }

        function openCheckoutModal() {
            const act = (allRacks[dInput.value] || []).filter(r => r.active);
            if(act.length === 0) return alert("No active racks to check out.");
            document.getElementById('checkoutRackSelector').innerHTML = act.map(r => `<option value="${r.id}">${r.serial}</option>`).join('');
            toggleModal('checkoutModal');
        }

        function toggleAddMode(mode) {
            addMode = mode;
            document.getElementById('yesterdaySelectGroup').classList.toggle('hidden', mode === 'new');
            document.getElementById('newEntryFields').classList.toggle('hidden', mode === 'yesterday');
            if(mode === 'yesterday') populateYesterday();
        }

        function populateYesterday() {
            const yest = new Date(dInput.value); yest.setDate(yest.getDate()-1);
            const yKey = yest.toISOString().split('T')[0];
            const racks = allRacks[yKey] || [];
            document.getElementById('yesterdayRackSelector').innerHTML = racks.map(r => `<option value='${JSON.stringify(r)}'>${r.serial}</option>`).join('');
        }

        function confirmAddRack() {
            let serial, location;
            if(addMode === 'yesterday') {
                const data = JSON.parse(document.getElementById('yesterdayRackSelector').value);
                serial = data.serial; location = data.location;
            } else {
                serial = document.getElementById('newRackSerial').value;
                location = document.getElementById('newRackLocation').value;
            }
            if(!serial) return alert("Serial required.");
            const date = dInput.value;
            if(!allRacks[date]) allRacks[date] = [];
            allRacks[date].push({ id: Date.now(), serial, location, test: document.getElementById('newRackTest').value, checkedBy: document.getElementById('newRackCheckedBy').value, active: true, passed: false, checkedOut: false, issuesFound: '', actionTaken: '' });
            sync(); toggleModal('rackModal');
        }

        function confirmPassRack() {
            const id = parseInt(document.getElementById('passRackSelector').value);
            const rack = allRacks[dInput.value].find(r => r.id === id);
            if(rack) { Object.assign(rack, { active: false, passed: true, actionTaken: document.getElementById('passNotes').value }); sync(); toggleModal('passModal'); }
        }

        function confirmCheckout() {
            const id = parseInt(document.getElementById('checkoutRackSelector').value);
            const rack = allRacks[dInput.value].find(r => r.id === id);
            if(rack) { Object.assign(rack, { active: false, checkedOut: true, issuesFound: document.getElementById('checkoutReason').value }); sync(); toggleModal('checkoutModal'); }
        }

        function updateShiftNotes() {
            const current = (allRacks[dInput.value] || []).filter(r => r.active);
            const cats = { early: [], slt: [], passed: [] };
            current.forEach(r => {
                if(["FRU", "IPU", "PR"].includes(r.test)) cats.early.push(r.serial);
                else if(r.test === "RUNIN") cats.slt.push(r.serial);
                else cats.passed.push(r.serial);
            });
            document.getElementById('shiftNotes').value = `SHIFT SUMMARY - ${dInput.value}\n\nEarly-stage (${cats.early.length}): ${cats.early.join(', ') || 'None'}\nIn SLT (${cats.slt.length}): ${cats.slt.join(', ') || 'None'}\nPassed SLT (${cats.passed.length}): ${cats.passed.join(', ') || 'None'}`;
        }

        function loadAndDisplayReport() {
            const date = dInput.value;
            const aT = document.getElementById('activeTableBody');
            aT.innerHTML = '';
            (allRacks[date] || []).filter(r => r.active).forEach(r => {
                aT.innerHTML += `<tr><td class="px-6 py-4 font-bold text-blue-400">${r.serial}</td><td class="px-6 py-4">${r.test}</td><td class="px-6 py-4">${r.location}</td><td class="px-6 py-4">${r.issuesFound}</td><td class="px-6 py-4">${r.actionTaken}</td><td class="px-6 py-4">${r.checkedBy}</td></tr>`;
            });
            document.getElementById('activeCount').innerText = `${(allRacks[date] || []).filter(r=>r.active).length} Units`;
            updateShiftNotes();
        }

        function sync() { localStorage.setItem('rackTrackerDB', JSON.stringify(allRacks)); loadAndDisplayReport(); }

        function exportForTeams() {
            const notes = document.getElementById('shiftNotes').value;
            let win = window.open('', '_blank');
            win.document.write(`<html><body><h1>Shift Handover</h1><pre>${notes}</pre></body></html>`);
            win.document.close();
        }
    </script>
</body>
</html>
