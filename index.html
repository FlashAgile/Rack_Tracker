<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rack Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { transition: background-color 0.3s, color 0.3s; }
        ::-webkit-calendar-picker-indicator { filter: invert(1); }
        [contenteditable]:focus { outline: 2px solid #3b82f6; background: #1e293b; border-radius: 4px; padding: 2px 4px; }
        #mainApp { display: none; }
        .export-layout { background-color: white !important; color: black !important; padding: 40px !important; width: 1200px !important; }
        .export-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .export-table th, .export-table td { border: 1px solid #ddd; padding: 12px; text-align: left; color: black !important; }
        .export-table th { background-color: #f2f2f2; font-size: 12px; text-transform: uppercase; }
        .export-notes { margin-top: 30px; padding: 20px; border-top: 2px solid #3b82f6; background: #f9fafb; color: black !important; }
        .sort-header { cursor: pointer; user-select: none; }
        .sort-header:hover { color: #60a5fa; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans p-6 md:p-10">

    <div id="loginScreen" class="fixed inset-0 bg-gray-950 flex items-center justify-center z-[100]">
        <div class="bg-gray-900 p-10 rounded-2xl border border-gray-800 shadow-2xl w-full max-w-md space-y-6">
            <div class="text-center">
                <h1 class="text-3xl font-extrabold text-blue-400">Rack<span class="text-white"> Tracker</span></h1>
            </div>
            <div class="space-y-4">
                <input type="text" id="userIn" placeholder="Username" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <input type="password" id="passIn" placeholder="Password" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                <div class="flex items-center gap-2 px-1">
                    <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded bg-gray-700 border-gray-600 text-blue-600">
                    <label for="rememberMe" class="text-sm text-gray-400">Remember Me</label>
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl">Login</button>
            </div>
        </div>
    </div>

    <div id="mainApp">
        <nav class="flex justify-between items-center pb-8 border-b border-gray-800 mb-8">
            <h1 class="text-3xl font-extrabold text-blue-400">Rack<span class="text-white"> Tracker</span></h1>
            <button onclick="logout()" class="text-gray-500 hover:text-red-400 text-xs">Logout</button>
        </nav>

        <div class="max-w-[1600px] mx-auto space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 bg-gray-900 p-6 rounded-2xl border border-gray-800 shadow-xl">
                <div class="space-y-2">
                    <label class="text-sm text-gray-400">Date</label>
                    <input type="date" id="dateFilter" class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                </div>
                <div class="space-y-2">
                    <label class="text-sm text-gray-400">Search Records</label>
                    <div class="flex gap-2">
                        <input type="text" id="searchQuery" placeholder="Search..." class="w-full bg-gray-800 p-3 rounded-lg border border-gray-700 text-white">
                        <button onclick="performGlobalSearch()" class="bg-blue-600 hover:bg-blue-700 p-3 rounded-lg text-white">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm text-gray-400">Action Menu</label>
                    <select id="actionMenu" onchange="handleActionMenu(this.value)" class="w-full bg-purple-900/20 border border-purple-500/30 p-3 rounded-lg text-purple-300 font-bold">
                        <option value="">-- Select Action --</option>
                        <option value="add">Add New Rack</option>
                        <option value="pass">Pass Rack</option>
                        <option value="export">Export Report</option>
                        <option value="import">Import File</option>
                        <option value="delete">Archive Rack</option>
                    </select>
                    <input type="file" id="importFile" class="hidden" onchange="importDatabase(event)">
                </div>
            </div>

            <div id="searchResultsSection" class="hidden space-y-4">
                <div class="flex justify-between items-center text-sm font-bold uppercase">
                    <h3 class="text-blue-400">Search Results</h3>
                    <button onclick="closeSearch()" class="text-gray-500 hover:text-white underline">Close</button>
                </div>
                <div class="bg-gray-900 border border-blue-900/30 rounded-2xl overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <tbody id="searchResultsBody" class="divide-y divide-gray-800"></tbody>
                    </table>
                </div>
            </div>

            <div id="activeExportContainer" class="rounded-2xl overflow-hidden border border-emerald-900/30 bg-gray-900">
                <div class="bg-emerald-900/20 px-6 py-4 border-b border-gray-800 flex justify-between">
                    <h3 class="text-lg font-bold text-emerald-400">Active Racks</h3>
                    <span id="activeCount" class="text-xs font-mono text-emerald-300">0 Units</span>
                </div>
                <table class="w-full text-left whitespace-nowrap">
                    <thead class="bg-gray-800 text-[11px] text-gray-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-6 py-3">Date</th>
                            <th class="px-6 py-3 sort-header" onclick="setSort('serial')">Rack ID ↕</th>
                            <th class="px-6 py-3">Location</th>
                            <th class="px-6 py-3">Issues Found</th>
                            <th class="px-6 py-3">Action Taken</th>
                            <th class="px-6 py-3">Tech</th>
                        </tr>
                    </thead>
                    <tbody id="activeTableBody" class="divide-y divide-gray-800 text-sm"></tbody>
                </table>
            </div>

            <div class="rounded-2xl overflow-hidden border border-blue-900/30 bg-gray-900">
                <div class="bg-blue-900/20 px-6 py-4 border-b border-gray-800 flex justify-between">
                    <h3 class="text-lg font-bold text-blue-400">Passed Racks</h3>
                    <span id="passedCount" class="text-xs font-mono text-blue-300">0 Units</span>
                </div>
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <tbody id="passedTableBody" class="divide-y divide-gray-800"></tbody>
                </table>
            </div>

            <div class="mt-8 bg-gray-900 p-6 rounded-2xl border border-blue-900/30">
                <h3 class="text-xl font-bold text-white mb-4">Shift Handover Notes</h3>
                <textarea id="shiftNotes" placeholder="Enter notes for next shift..." class="w-full bg-gray-950 p-4 rounded-xl border border-gray-800 text-gray-300 h-32" oninput="saveNotesLocally()"></textarea>
            </div>
        </div>
    </div>

    <div id="exportTemplate" class="hidden">
        <div id="exportContent">
            <h1 style="font-size: 24px; color: #1e3a8a; margin-bottom: 5px;">Daily Rack Tracker Report</h1>
            <p id="exportDateLabel" style="color: #666; margin-bottom: 20px;"></p>
            <table class="export-table">
                <thead><tr><th>Rack ID</th><th>Location</th><th>Issues Found</th><th>Action Taken</th><th>Tech</th></tr></thead>
                <tbody id="exportTableBody"></tbody>
            </table>
            <div class="export-notes">
                <h3 style="color: #1e3a8a; margin-bottom: 10px; font-size: 18px;">Notes</h3>
                <p id="exportNotesContent" style="white-space: pre-wrap;"></p>
            </div>
        </div>
    </div>

    <div id="rackModal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 opacity-0 pointer-events-none transition-opacity">
        <div class="bg-gray-900 w-full max-w-2xl p-8 rounded-2xl border border-gray-700 space-y-4">
            <h3 class="text-2xl font-bold text-blue-400">Log New Rack</h3>
            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="serial" placeholder="Rack ID" class="bg-gray-800 p-3 rounded-lg text-white">
                <input type="text" id="location" placeholder="Location" class="bg-gray-800 p-3 rounded-lg text-white">
                <input type="text" id="status" placeholder="Status (Hidden from table)" class="bg-gray-800 p-3 rounded-lg text-white">
                <input type="text" id="checkedBy" placeholder="Tech Name" class="bg-gray-800 p-3 rounded-lg text-white">
            </div>
            <textarea id="issuesFound" placeholder="Issues..." class="w-full bg-gray-800 p-3 rounded-lg text-white"></textarea>
            <textarea id="actionTaken" placeholder="Action..." class="w-full bg-gray-800 p-3 rounded-lg text-white"></textarea>
            <div class="flex gap-4">
                <button onclick="saveRackEntry()" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">Save</button>
                <button onclick="toggleModal('rackModal')" class="flex-1 bg-gray-700 py-3 rounded-xl">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const auth = { user: 'Admin', pass: '0122' };
        let allRacks = JSON.parse(localStorage.getItem('rackTrackerDB')) || {};
        let currentSort = { key: 'id', dir: 'asc' };

        window.onload = function() {
            if(localStorage.getItem('rememberMe') === 'true') enterApp();
            document.getElementById('shiftNotes').value = localStorage.getItem('shiftNotes') || "";
        };

        function handleLogin() {
            const u = document.getElementById('userIn').value;
            const p = document.getElementById('passIn').value;
            if(u === auth.user && p === auth.pass) {
                if(document.getElementById('rememberMe').checked) localStorage.setItem('rememberMe', 'true');
                enterApp();
            } else alert("Invalid Login");
        }

        function enterApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            const d = document.getElementById('dateFilter');
            if(!d.value) d.value = new Date().toISOString().split('T')[0];
            d.addEventListener('change', loadAndDisplayReport);
            loadAndDisplayReport();
        }

        function logout() { localStorage.removeItem('rememberMe'); location.reload(); }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.classList.toggle('opacity-0');
            m.classList.toggle('pointer-events-none');
        }

        function handleActionMenu(val) {
            if(val === 'add') toggleModal('rackModal');
            if(val === 'export') exportReport();
            if(val === 'import') document.getElementById('importFile').click();
            document.getElementById('actionMenu').value = "";
        }

        function saveRackEntry() {
            const date = document.getElementById('dateFilter').value;
            if(!allRacks[date]) allRacks[date] = [];
            allRacks[date].push({
                id: Date.now(),
                serial: document.getElementById('serial').value,
                location: document.getElementById('location').value,
                status: document.getElementById('status').value,
                checkedBy: document.getElementById('checkedBy').value,
                issuesFound: document.getElementById('issuesFound').value,
                actionTaken: document.getElementById('actionTaken').value,
                active: true, passed: false
            });
            syncData();
            toggleModal('rackModal');
            ['serial','location','status','checkedBy','issuesFound','actionTaken'].forEach(id=>document.getElementById(id).value='');
        }

        function loadAndDisplayReport() {
            const date = document.getElementById('dateFilter').value;
            const activeBody = document.getElementById('activeTableBody');
            activeBody.innerHTML = '';
            const data = allRacks[date] || [];
            data.forEach(r => {
                if(r.active) {
                    activeBody.innerHTML += `<tr>
                        <td class="px-6 py-4 text-[10px] text-gray-500">${date}</td>
                        <td class="px-6 py-4 font-bold text-blue-400">${r.serial}</td>
                        <td class="px-6 py-4 text-gray-300">${r.location || '--'}</td>
                        <td class="px-6 py-4 text-gray-400 italic">${r.issuesFound || ''}</td>
                        <td class="px-6 py-4 text-emerald-400">${r.actionTaken || ''}</td>
                        <td class="px-6 py-4 text-gray-500">${r.checkedBy || ''}</td>
                    </tr>`;
                }
            });
            document.getElementById('activeCount').innerText = `${data.filter(r=>r.active).length} Units`;
        }

        function performGlobalSearch() {
